<!DOCTYPE html>
<html>
<head>
    <title>Trang điền thông tin</title>
    <link rel="stylesheet" href="thong tin.css">
</head>
<body>

    <h1>Thông Tin Nhận Hàng</h1>
    <p>Vui lòng điền đầy đủ các thông tin dưới đây:</p>

    <form>
        <label>Họ và tên:</label><br>
        <input type="text" name="hoten" ><br><br>

        <label>Số điện thoại:</label><br>
        <input type="number" name="sodt" ><br><br>

        <label>Địa chỉ nhận hàng:</label><br>
        <textarea name="diachi" rows="4" cols="30" ></textarea><br><br>

        <input type="submit" value="Gửi thông tin">
        <input type="reset" value="Xóa hết">
    </form>

</body>
</html>
